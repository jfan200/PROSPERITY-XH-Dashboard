services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prosperity-xh-dashboard
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      DEPLOY_TARGET: docker
      DATA_DIR: /app/data
      TAPTOUCH_SCRAPER_MODE: inline
      TAPTOUCH_DETAIL_PRIME_COUNT: "0"
      TAPTOUCH_DETAIL_PREFETCH_WORKERS: "1"
    volumes:
      - dashboard-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/healthz').then(r=>{if(!r.ok) process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 25s

volumes:
  dashboard-data:
